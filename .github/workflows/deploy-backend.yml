name: Deploy Backend (ECR)

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch: {}

# Sửa các giá trị này cho đúng tài khoản của bạn (hoặc set thành GitHub Variables).
env:
  AWS_REGION: ap-southeast-1
  ECR_REPOSITORY: demo
  AWS_ROLE_ARN: arn:aws:iam::028708951757:role/GitHub-CI-ECR

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # bắt buộc để lấy OIDC token
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: backend/go.sum

      - name: Vet & build (sanity check)
        working-directory: backend
        run: |
          go vet ./...
          go build ./...

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Repo "demo" đã tồn tại sẵn nên không cần bước tạo repo
      # (tránh phải cấp quyền ecr:DescribeRepositories/CreateRepository).

      - name: Build & push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          IMAGE="$REGISTRY/$ECR_REPOSITORY"
          docker build -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" ./backend
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"
          echo "Pushed $IMAGE:${{ github.sha }}"

      # (Tuỳ chọn) Rollout service ECS đang chạy image này:
      # - name: Deploy to ECS
      #   run: |
      #     aws ecs update-service --cluster my-cluster --service todo-api --force-new-deployment
